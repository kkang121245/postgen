<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>인스타 글꾸 생성기</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#ffffff">
<link rel="apple-touch-icon" href="icon-192.png">

<style>
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");
@import url("https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&display=swap");

:root{
  --accent-a: #f3a0c3;
  --accent-b: #b39ddb;
  --accent-grad: linear-gradient(135deg, #f6a8ca, #b39ddb);
  --accent: #d689b3;
  --ink: #3d3457;
  --sub: #9c93b8;
  --border: #ecdff2;
  --danger: #ef6d94;
  --card-bg: #ffffff;
  --shadow-soft: 0 14px 32px rgba(170, 140, 210, 0.16);
}

*{ box-sizing: border-box; }

body{
  margin: 0;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  color: var(--ink);
  min-height: 100vh;
  -webkit-tap-highlight-color: transparent;
  background:
    radial-gradient(520px 380px at 8% 0%, rgba(255, 205, 225, 0.55), transparent 60%),
    radial-gradient(560px 420px at 100% 12%, rgba(190, 175, 245, 0.5), transparent 60%),
    radial-gradient(480px 420px at 92% 100%, rgba(180, 215, 250, 0.45), transparent 60%),
    linear-gradient(160deg, #fdf1f6 0%, #f4eefb 50%, #eef2fc 100%);
  background-attachment: fixed;
}

.site{
  width: 100%;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.topbar{
  position: sticky;
  top: 0;
  z-index: 20;
  background: rgba(255,255,255,0.65);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.6);
  box-shadow: 0 8px 24px rgba(170, 140, 210, 0.08);
  flex-shrink: 0;
}
.topbar-inner{
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.topbar-title{
  font-family: 'Gowun Batang', 'Pretendard', serif;
  font-size: 22px;
  font-weight: 700;
  letter-spacing: 0.01em;
  margin: 0;
  background: var(--accent-grad);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}
.icon-btn{
  width: 40px;
  height: 40px;
  border-radius: 50%;
  border: none;
  background: transparent;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--ink);
  transition: background .15s ease, transform .15s ease;
  padding: 0;
}
.icon-btn:hover{ background: rgba(179, 157, 219, 0.12); }
.icon-btn.accent{
  color: #fff;
  background: var(--accent-grad);
  box-shadow: 0 6px 16px rgba(214, 137, 179, 0.35);
}
.icon-btn.accent:hover{ transform: translateY(-1px) scale(1.04); box-shadow: 0 8px 20px rgba(214, 137, 179, 0.45); }

.feed {
  flex: 1;
  width: 100%;
  max-width: 560px;
  margin: 0 auto;
  padding: 24px 20px 8px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  gap: 22px;
}

.empty-state{
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 70px 24px;
  color: #b3a9cf;
  gap: 14px;
  background: rgba(255,255,255,0.55);
  border-radius: 28px;
  border: 1px solid rgba(255,255,255,0.7);
}
.empty-state svg{ color: #cbb8e6; }
.empty-state p{ margin: 0; font-size: 14px; font-weight: 600; color: #9c8fc0; }
.empty-state .btn-primary{ margin-top: 4px; }

.post-card{
  position: relative;
  filter: drop-shadow(0 10px 26px rgba(180, 155, 220, 0.16));
}
.insta-post {
  max-width: 100% !important;
}
.post-menu-btn{
  position: absolute;
  top: 20px;
  right: 17px;
  width: 34px;
  height: 34px;
  border: none;
  background: transparent;
  border-radius: 50%;
  cursor: pointer;
  z-index: 6;
  transition: background .15s ease;
}
.post-menu-btn:hover{ background: rgba(0,0,0,0.06); }
.post-menu-btn--dots::after{
  content: "•••";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  font-weight: bold;
  color: #8e8e8e;
  letter-spacing: 2px;
  font-size: 13px;
  pointer-events: none;
}
.post-menu-dropdown{
  position: absolute;
  top: 48px;
  right: 12px;
  min-width: 132px;
  background: #fff;
  border: 1px solid var(--border);
  border-radius: 16px;
  box-shadow: 0 16px 32px rgba(170, 140, 210, 0.22);
  overflow: hidden;
  z-index: 7;
  display: none;
}
.post-menu-dropdown.open{ display: block; }
.post-menu-dropdown button{
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 12px 14px;
  background: none;
  border: none;
  font-family: inherit;
  font-size: 13.5px;
  font-weight: 600;
  color: var(--ink);
  cursor: pointer;
  text-align: left;
}
.post-menu-dropdown button:hover{ background: #fbf3f8; }
.post-menu-dropdown button.danger{ color: var(--danger); }
.post-menu-dropdown button svg{ flex-shrink: 0; }

.feed-footer{
  flex-shrink: 0;
  width: 100%;
  max-width: 560px;
  margin: 12px auto 0;
  padding: 18px 20px 44px;
  box-sizing: border-box;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}
.btn-copy{
  width: 100%;
  padding: 15px;
  border-radius: 999px;
  border: none;
  background: var(--accent-grad);
  color: #fff;
  font-family: inherit;
  font-size: 15px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  cursor: pointer;
  box-shadow: 0 10px 24px rgba(214, 137, 179, 0.35);
  transition: transform .15s ease, box-shadow .15s ease;
}
.btn-copy:hover{ transform: translateY(-1px); box-shadow: 0 14px 30px rgba(214, 137, 179, 0.45); }
.btn-copy:active{ transform: scale(0.98); }
.btn-copy:disabled{ opacity: .35; cursor: not-allowed; box-shadow: none; transform: none; }
.btn-reset-link{
  background: none;
  border: none;
  color: var(--danger);
  font-family: inherit;
  font-size: 12.5px;
  font-weight: 600;
  cursor: pointer;
  padding: 4px 8px;
  opacity: .8;
}
.btn-reset-link:hover{ text-decoration: underline; }

.btn-primary{
  background: var(--accent-grad);
  color: #fff;
  border: none;
  padding: 12px 22px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  box-shadow: 0 8px 18px rgba(214, 137, 179, 0.3);
  transition: transform .15s ease, box-shadow .15s ease;
}
.btn-primary:hover{ transform: translateY(-1px); box-shadow: 0 10px 22px rgba(214, 137, 179, 0.4); }
.btn-outline{
  background: #fff;
  color: var(--ink);
  border: 1.5px solid var(--border);
  padding: 12px 22px;
  border-radius: 999px;
  font-family: inherit;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
}
.btn-outline:hover{ background: #fbf5fb; border-color: #e2c9e8; }

.modal-overlay{
  position: fixed;
  inset: 0;
  background: rgba(60, 40, 70, 0.42);
  backdrop-filter: blur(2px);
  display: flex;
  align-items: flex-end;
  justify-content: center;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity .2s ease;
  padding: 0;
}
.modal-overlay.open{ opacity: 1; pointer-events: auto; }
.modal-sheet{
  width: 100%;
  max-width: 460px;
  max-height: 90vh;
  background: #fffdfd;
  border-radius: 28px 28px 0 0;
  display: flex;
  flex-direction: column;
  transform: translateY(24px);
  transition: transform .25s cubic-bezier(.25,.8,.25,1);
  box-shadow: 0 -10px 40px rgba(150, 110, 180, 0.2);
}
.modal-overlay.open .modal-sheet{ transform: translateY(0); }
@media (min-width: 620px){
  .modal-overlay{ align-items: center; }
  .modal-sheet{ border-radius: 26px; max-height: 86vh; }
}
.modal-header{
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px 20px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.modal-header h2{
  font-family: 'Gowun Batang', 'Pretendard', serif;
  margin: 0;
  font-size: 18px;
  font-weight: 700;
  color: var(--ink);
}
.modal-body{
  padding: 20px;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.type-toggle {
  display: flex;
  gap: 8px;
  background: #fbf6fb;
  padding: 6px;
  border-radius: 16px;
  margin-bottom: 4px;
}
.type-toggle label {
  flex: 1;
  text-align: center;
  font-size: 14px;
  font-weight: 700;
  color: #9385ab;
  padding: 10px;
  border-radius: 12px;
  cursor: pointer;
  transition: all .2s;
  user-select: none;
}
.type-toggle input { display: none; }
.type-toggle input:checked + label {
  background: #fff;
  color: var(--accent);
  box-shadow: 0 4px 12px rgba(170, 140, 210, 0.15);
}
.dynamic-fields {
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.field{ display: flex; flex-direction: column; gap: 6px; }
.field label{ font-size: 12.5px; font-weight: 700; color: #9385ab; }
.field-row{ display: flex; gap: 8px; align-items: flex-end; }
.field-row .field{ flex: 1; }
input[type="text"], textarea{
  width: 100%;
  padding: 12px 14px;
  border: 1.5px solid var(--border);
  border-radius: 14px;
  font-size: 14px;
  font-family: inherit;
  outline: none;
  background: #fbf6fb;
  color: var(--ink);
  transition: border-color .15s ease, background .15s ease;
}
#postOnlyFieldsBottom {
  padding-bottom: 65px;
}
input[type="text"]:focus, textarea:focus{ border-color: var(--accent-b); background: #fff; }
.images-textarea{ height: 84px; resize: vertical; font-family: 'SFMono-Regular', Menlo, monospace; font-size: 12.5px; }
.btn-now{
  padding: 12px 14px;
  border-radius: 14px;
  border: 1.5px solid var(--border);
  background: #fbf6fb;
  font-family: inherit;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  cursor: pointer;
  white-space: nowrap;
}
.btn-now:hover{ background: #f6e9f3; }
.modal-actions{
  display: flex;
  gap: 10px;
  padding-top: 4px;
  position: absolute;
  bottom: 15px;
  width: 90%;
  left: 50%;
  transform: translateX(-50%);
}
.modal-actions button{ flex: 1; }
.hint{ font-size: 11.5px; color: var(--sub); margin: -8px 0 0; }

.toast{
  position: fixed;
  left: 50%;
  bottom: 30px;
  transform: translate(-50%, 16px);
  background: linear-gradient(135deg, #4a3f66, #6a4f7e);
  color: #fff;
  padding: 13px 22px;
  border-radius: 999px;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13.5px;
  font-weight: 700;
  opacity: 0;
  pointer-events: none;
  transition: opacity .25s ease, transform .25s ease;
  z-index: 300;
  box-shadow: 0 14px 32px rgba(80, 50, 100, .3);
  max-width: 90vw;
}
.toast.show{ opacity: 1; transform: translate(-50%, 0); }
.toast.toast-error{ background: linear-gradient(135deg, var(--danger), #d9527a); }

@media (max-width: 480px){
  .topbar{ padding: 14px 16px; }
  .feed{ padding: 18px 16px 8px; }
  .feed-footer{ padding: 16px 16px 36px; }
}
</style>
</head>
<body>

<div class="site">

  <header class="topbar">
    <div class="topbar-inner">
      <button type="button" class="icon-btn accent" id="cameraBtn" title="게시물 추가" aria-label="게시물 추가">
        <svg width="21" height="21" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"/><circle cx="12" cy="13" r="3.2"/></svg>
      </button>
      <h1 class="topbar-title">Feed</h1>
      <button type="button" class="icon-btn accent" id="addBtn" title="게시물 추가" aria-label="게시물 추가">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
  </header>

  <main class="feed" id="feed">
    <div class="empty-state" id="emptyState">
      <svg width="46" height="46" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <p>아직 게시물이 없어요</p>
      <button type="button" class="btn-primary" onclick="openModal()">+ 첫 게시물 만들기</button>
    </div>
  </main>

  <div class="feed-footer">
    <button type="button" class="btn-copy" id="copyBtn" onclick="copyCode()">
      <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      코드 복사하기
    </button>
    <button type="button" class="btn-reset-link" onclick="resetAll()">전체 초기화</button>
  </div>

</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-sheet">
    <div class="modal-header">
      <h2 id="modalTitle">새 게시물</h2>
      <button type="button" class="icon-btn" onclick="closeModal()" aria-label="닫기">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <form class="modal-body" id="postForm" onsubmit="handleSubmit(event)">
      <div class="type-toggle">
        <input type="radio" name="f-type" id="type-post" value="post" checked onchange="toggleFields()">
        <label for="type-post">게시글</label>
        
        <input type="radio" name="f-type" id="type-grid" value="grid" onchange="toggleFields()">
        <label for="type-grid">피드</label>
      </div>

      <div class="field">        
        <div class="field" style="flex-direction: row; align-items: center; gap: 8px;">
          <input type="checkbox" id="f-expanded" style="width: auto;">
          <label for="f-expanded" style="margin: 0;">펼쳐두기</label>
        </div>
        <label>이름</label>
        <input type="text" id="f-username" placeholder="noname">
      </div>
      <div class="field">
        <label>프로필 사진 URL</label>
        <input type="text" id="f-profile" placeholder="비워두면 첫 번째 사진 자동 사용">
      </div>

      <div id="postOnlyFieldsTop" class="dynamic-fields">
        <div class="field-row">
          <div class="field">
            <label>작성 시간</label>
            <input type="text" id="f-time" placeholder="오후 4:21">
          </div>
          <button type="button" class="btn-now" onclick="document.getElementById('f-time').value = getCurrentTimeStr()">지금</button>
        </div>
      </div>

      <div class="field">
        <label>이미지 주소 (엔터로 구분)</label>
        <textarea class="images-textarea" id="f-images" placeholder="https://example.com/img1.jpg&#10;https://example.com/img2.jpg"></textarea>
      </div>

      <div id="postOnlyFieldsBottom" class="dynamic-fields">
        <div class="field">
          <label id="captionLabel">본문 텍스트</label>
          <textarea id="f-caption" style="height: 80px; resize: vertical;" placeholder="본문 내용 입력"></textarea>
        </div>
        <div class="field">
          <label>해시태그</label>
          <input type="text" id="f-tags" placeholder="#피드">
        </div>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-outline" onclick="closeModal()">취소</button>
        <button type="submit" class="btn-primary" id="submitBtn">등록하기</button>
      </div>
    </form>
  </div>
</div>

<div class="toast" id="toast">
  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
  <span id="toastMsg">코드가 복사되었습니다</span>
</div>

<script>
const baseStaticCss = `
@import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css");

.insta-gallery-container * { box-sizing: border-box !important; }

.insta-post {width: 100%; max-width: 480px;}
.insta-post details>summary { width: 100%; }
.insta-post .post-content details>summary { padding: 0 !important; }
.insta-post details>summary:before { display: none !important; }
.post-content details>summary:before, [contenteditable=true] details>summary:before { display: none !important; }

.insta-post[open] .insta-summary { 
  border-bottom-left-radius: 0 !important; border-bottom-right-radius: 0 !important; 
}
.insta-summary::-webkit-details-marker, .insta-summary::before { display: none !important; }
[class*="insta"] .image-number-badge { display: none !important; }

.heart-icon::before, .bubble-icon::before, .airplain-icon::before, .bookmark-icon::before {
  content: '' !important;
  display: block !important;
  width: 24px !important;
  height: 24px !important;
  background-size: 24px 24px !important;
  background-repeat: no-repeat !important;
  background-position: center !important;
}
 
.action-icon { transition: transform 0.2s !important; transform: scale(0.75) }
.heart-icon::before { background-image: url('https://i.postimg.cc/Fzzd703V/heart.png') !important; }
.heart-icon:active::before { background-image: url('https://i.postimg.cc/yNwsF9My/red-heart.png') !important; }
.bubble-icon::before { background-image: url('https://i.postimg.cc/tJJZYFWk/message-circle.png') !important; }
.airplain-icon::before { background-image: url('https://i.postimg.cc/VvvrdXnF/send.png') !important; }
.bookmark-icon::before { background-image: url('https://i.postimg.cc/J00DGjZq/bookmark.png') !important; }

.img-spoiler-overlay {
  position: absolute !important;
  inset: 0 !important;
  z-index: 10 !important;
  display: block !important;
}
.img-spoiler-overlay:not(.revealed),
.img-spoiler-overlay:not(.revealed):hover {
  backdrop-filter: blur(15px) !important;
  -webkit-backdrop-filter: blur(15px) !important;
  background-color: transparent !important;
  color: transparent !important;
}
.img-spoiler-overlay:not(.revealed)
.img-spoiler-overlay.revealed,
[class*="insta"] .spoiler.revealed,
[class*="insta"] [data-spoiler="true"].revealed {
  backdrop-filter: none !important;
  -webkit-backdrop-filter: none !important;
  background-color: transparent !important;
  pointer-events: none !important;
}
`;
 
const styleEl = document.createElement('style');
styleEl.innerHTML = baseStaticCss;
document.head.appendChild(styleEl);

const getSafeIcons = (pid) => `
    <input type="checkbox" id="${pid}_like" style="display:none !important;">
    <div class="action-bar" style="display: flex !important; justify-content: space-between !important; margin-bottom: 14px !important; user-select: none !important; line-height: 1 !important; align-items: center !important;">
      <div class="action-left" style="display: flex !important; gap: 16px !important;">
        <label for="${pid}_like" class="action-icon heart-icon" style="cursor: pointer !important; color: #262626 !important; display: inline-block !important; width: 24px !important; height: 24px !important;"></label>
        <span class="action-icon bubble-icon" style="cursor: pointer !important; color: #262626 !important; display: inline-block !important; width: 24px !important; height: 24px !important;"></span>
        <span class="action-icon airplain-icon" style="cursor: pointer !important; color: #262626 !important; display: inline-block !important; width: 24px !important; height: 24px !important;"></span>
      </div>
      <span class="action-icon bookmark-icon" style="cursor: pointer !important; color: #262626 !important; display: inline-block !important; width: 24px !important; height: 24px !important;"></span>
    </div>`;

function getCurrentTimeStr() {
    const now = new Date();
    const hours = now.getHours();
    const minutes = now.getMinutes().toString().padStart(2, '0');
    const ampm = hours >= 12 ? '오후' : '오전';
    const displayHours = hours % 12 || 12;
    return `${ampm} ${displayHours}:${minutes}`;
}

// ----------------------------------------
// 프로필
// ----------------------------------------
function buildGridMarkup(post) {
    const pid = 'g' + Math.random().toString(36).substr(2, 6);
    const images = (post.images || '').split('\n').map(u => u.trim()).filter(u => u !== '').map(url => {
        const isSpoiler = url.startsWith('[') && url.endsWith(']');
        return { url: isSpoiler ? url.slice(1, -1) : url, isSpoiler };
    });
    
    const postCount = images.length;
    const now = new Date();
    const month = now.getMonth() + 1;
    const date = now.getDate();

    const username = (post.username || '').trim() || 'noname';
    const caption = (post.caption || '').trim();
    const tags = (post.tags || '').trim();
    let profilePic = (post.profile || '').trim();
    if (!profilePic && postCount > 0) profilePic = images[0].url;

    const profileImgTag = profilePic
        ? `<img src="${profilePic}" alt="profile" style="width: 100% !important; height: 100% !important; object-fit: cover !important; display: block !important; aspect-ratio: 1/1; margin: 0 !important;">`
        : `<div style="width: 100% !important; height: 100% !important; background-color: #efefef !important;"></div>`;

    let css = `
#profile_${pid} {
    width: 100% !important;
    margin-bottom: 24px !important;
    background: #ffffff !important;
    border: 1px solid #dbdbdb !important;
    border-radius: 24px !important;
    overflow: hidden !important;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08) !important;
}
#wrap_${pid} {
    display: grid !important;
    grid-template-columns: repeat(3, 1fr) !important;
    gap: 3px !important;
    width: 100% !important;
    background: #ffffff !important;
}
#wrap_${pid} .grid-item {
    position: relative !important;
    width: 100% !important;
    display: block !important;
}
[class*="insta"] .image-number-wrapper {
    display: block !important;
    width: 100%;
    text-align: center;
}
#wrap_${pid} img {
    width: 100% !important;
    height: 100% !important;
    object-fit: cover !important;
    display: block !important;
    aspect-ratio: 1/1;
    margin: 0 !important;
}
`;
    
    let html = `\n  <!-- [프로필 피드: ${username}] -->\n`;
    html += `  <div id="profile_${pid}" style="overflow: hidden !important;">\n`;
    
    html += `    <div style="display: flex !important; padding: 20px 20px 16px !important; align-items: center !important; gap: 20px !important;">\n`;
    html += `      <div style="width: 66px !important; height: 66px !important; border-radius: 50% !important; overflow: hidden !important; flex-shrink: 0 !important; border: 1px solid #dbdbdb !important;">\n`;
    html += `        ${profileImgTag}\n`;
    html += `      </div>\n`;
    html += `      <div style="flex: 1 !important;display: flex !important;justify-content: space-between !important;text-align: center !important;padding-right: 10px !important; width: calc(100% - 30px); max-width: 300px; margin-left: auto;">\n`;
    html += `        <div><strong style="display: block !important; font-size: 16px !important; color: #262626 !important;">${postCount}</strong><span style="font-size: 13px !important; color: #262626 !important;">게시물</span></div>\n`;
    html += `        <div><strong style="display: block !important; font-size: 16px !important; color: #262626 !important;">${month}</strong><span style="font-size: 13px !important; color: #262626 !important;">팔로워</span></div>\n`;
    html += `        <div><strong style="display: block !important; font-size: 16px !important; color: #262626 !important;">${date}</strong><span style="font-size: 13px !important; color: #262626 !important;">팔로잉</span></div>\n`;
    html += `      </div>\n`;
    html += `    </div>\n`;

    html += `    <div style="padding: 0 20px 16px !important; font-size: 14px !important; color: #262626 !important; line-height: 1.4 !important;">\n`;
    html += `      <strong style="font-weight: 700 !important; color: #262626 !important;">${username}</strong>\n`;
    if (caption) {
        html += `      <div style="color: #262626 !important; margin-top: 4px !important; word-break: break-word !important; white-space: pre-line !important;">${caption}</div>\n`;
    }
    if (tags) {
        html += `      <div style="color: #00376b !important; font-size: 13px !important; margin-top: 4px !important; word-break: break-word !important;">${tags}</div>\n`;
    }
    html += `    </div>\n`;

    html += `    <div style="border-top: 1px solid #efefef !important; display: flex !important; justify-content: space-between !important; width:100%;">\n`;
    html += `      <div style="width: calc(100% / 3); border-top: 1px solid #262626 !important; padding: 12px !important; margin-top: -1px !important; display: flex !important; align-items: center !important; height: 35px !important;">\n`;
    html += `        <img src="https://i.postimg.cc/59TsTKt8/grid-3x3.png" style="margin: 0 auto">\n`;
    html += `      </div>\n`;
    html += `      <div style="width: calc(100% / 3); border-top: 1px solid transparent !important; padding: 12px !important; margin-top: -1px !important; display: flex !important; align-items: center !important; height: 35px !important;">\n`;
    html += `        <img src="https://i.postimg.cc/4ykhbcJm/film.png" style="margin: 0 auto">\n`;
    html += `      </div>\n`;
    html += `      <div style="width: calc(100% / 3); border-top: 1px solid transparent !important; padding: 12px !important; margin-top: -1px !important; display: flex !important; align-items: center !important; height: 35px !important;">\n`;
    html += `        <img src="https://i.postimg.cc/B6s0TZdp/contact.png" style="margin: 0 auto">\n`;
    html += `      </div>\n`;
    html += `    </div>\n`;
    
    html += `    <div id="wrap_${pid}">\n`;
    if (postCount === 0) {
        html += `      <div style="grid-column: 1 / -1 !important; padding: 50px !important; text-align: center !important; color: #8e8e8e !important; font-size: 14px !important; background: #fafafa !important;">NO IMAGE</div>\n`;
    } else {
        images.forEach((img, i) => {
            html += `      <div class="grid-item">\n`;
            html += `        <img src="${img.url}" alt="grid image ${i+1}">\n`;
            if (img.isSpoiler) {
                html += `        <span class="spoiler img-spoiler-overlay" data-spoiler="true"></span>\n`;
            }
            html += `      </div>\n`;
        });
    }
    html += `    </div>\n`;
    html += `  </div>\n`;
    
    return { css, html };
}

function buildPostMarkup(post) {
    const bg = "#ffffff";
    const text = "#262626";
    const sub = "#8e8e8e";
    const border = "#dbdbdb";
    const imgBg = "#efefef";

    const pid = 'p' + Math.random().toString(36).substr(2, 6);

    const username = (post.username || '').trim() || 'user';
    const inputProfilePic = (post.profile || '').trim();
    const time = (post.time || '').trim() || 'Just now';
    const caption = (post.caption || '').trim();
    const tags = (post.tags || '').trim();
    const expanded = !!post.expanded;
    const wrapTag = expanded ? 'div' : 'details';
    const headTag = expanded ? 'div' : 'summary';
    const headCursor = expanded ? 'default' : 'pointer';
    const images = (post.images || '').split('\n').map(u => u.trim()).filter(u => u !== '').map(url => {
        const isSpoiler = url.startsWith('[') && url.endsWith(']');
        return { url: isSpoiler ? url.slice(1, -1) : url, isSpoiler };
    });
    const n = images.length;

    let finalProfilePic = inputProfilePic;
    if (!finalProfilePic && n > 0) {
        finalProfilePic = images[0].url;
    }

    const profileImgTag = finalProfilePic
        ? `<img src="${finalProfilePic}" alt="profile" style="width: 40px !important; height: 40px !important; min-width: 40px !important; max-height: 40px !important; border-radius: 50% !important; background-color: ${border} !important; object-fit: cover !important; border: 1px solid ${border} !important; display: block !important; margin: 0 !important; flex-shrink: 0 !important;">`
        : `<div style="width: 40px !important; height: 40px !important; min-width: 40px !important; border-radius: 50% !important; background-color: ${border} !important; border: 1px solid ${border} !important; display: block !important; margin: 0 !important; flex-shrink: 0 !important;"></div>`;

    let dynamicStyles = '';
    dynamicStyles += `#${pid}_like:checked ~ .action-bar .heart-icon::before { background-image: url('https://i.postimg.cc/yNwsF9My/red-heart.png') !important; }\n`;

    if (n > 1) {
        dynamicStyles += `
#wrap_${pid} .carousel-track { width: ${n * 100}% !important; }
#wrap_${pid} .slide-unit { width: 100% !important; }
#wrap_${pid} .nav-L, #wrap_${pid} .nav-R { display: none !important; }
`;
        for (let i = 0; i < n; i++) {
            dynamicStyles += `#${pid}_s${i}:checked ~ .carousel-track { transform: translateX(-${100 * i}%) !important; }\n`;
            if (i > 0) {
                dynamicStyles += `#${pid}_s${i}:checked ~ .nav-L.to_s${i-1} { display: flex !important; }\n`;
            }
            if (i < n - 1) {
                dynamicStyles += `#${pid}_s${i}:checked ~ .nav-R.to_s${i+1} { display: flex !important; }\n`;
            }
        }
    } else {
        dynamicStyles += `
#wrap_${pid} .carousel-track { width: 100% !important; }
#wrap_${pid} .slide-unit { width: 100% !important; }
`;
    }

    let bodyHtml = '';
    bodyHtml += `\n  <!-- [포스트: ${username}] -->\n`;
    bodyHtml += `  <${wrapTag} class="insta-post"${expanded ? '' : ' open'} style="background-color: ${bg} !important; border-radius: 24px !important; margin-bottom: 24px !important; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08) !important; width: 100% !important; border: 1px solid ${border} !important; display: block !important;">\n`;

    bodyHtml += `    <${headTag} class="insta-summary" style="border-radius: 24px !important; padding: 16px 20px !important; cursor: ${headCursor} !important; list-style: none !important; display: flex !important; align-items: center !important; justify-content: space-between !important; user-select: none !important; background-color: ${bg} !important; width: 100% !important; height: 72px !important; box-sizing: border-box !important;">\n`;
    bodyHtml += `      <div style="display: flex !important; align-items: center !important; gap: 12px !important;">\n`;
    bodyHtml += `        ${profileImgTag}\n`;
    bodyHtml += `        <div style="display: flex !important; flex-direction: row !important; align-items: center !important; gap: 10px !important;">\n`;
    bodyHtml += `          <span style="font-weight: 700 !important; font-size: 14px !important; letter-spacing: 0.2px !important; color: ${text} !important; margin: 0 !important; line-height: 1 !important; white-space: nowrap;">${username}</span>\n`;
    bodyHtml += `          <span style="font-size: 11px !important; color: ${sub} !important; font-weight: 500 !important; margin: 0 !important; line-height: 1 !important; white-space: nowrap; padding-top: 1px">${time}</span>\n`;
    bodyHtml += `        </div>\n`;
    bodyHtml += `      </div>\n`;
    bodyHtml += `      <div style="font-weight: bold !important; color: ${sub} !important; letter-spacing: 2px !important; font-size: 13px !important; margin-top: -3px !important;">•••</div>\n`;
    bodyHtml += `    </${headTag}>\n`;

    bodyHtml += `    <div class="post-content" style="background-color: ${bg} !important; border-top: 1px solid ${border} !important; width: 100% !important; border-bottom-left-radius: 24px !important; border-bottom-right-radius: 24px !important;">\n`;

    bodyHtml += `      <div id="wrap_${pid}" style="display: grid !important; grid-template-columns: 1fr !important; grid-template-rows: 1fr !important; width: 100% !important; aspect-ratio: 1 / 1 !important; background: ${imgBg} !important; overflow: hidden !important;">\n`;

    if (n === 0) {
        bodyHtml += `        <div style="grid-row: 1 !important; grid-column: 1 !important; width: 100% !important; height: 100% !important; display: flex !important; align-items: center !important; justify-content: center !important; color: ${sub} !important;">NO IMAGE</div>\n`;
    } else {
        if (n > 1) {
            for (let i = 0; i < n; i++) {
                bodyHtml += `        <input type="radio" name="grp_${pid}" id="${pid}_s${i}" ${i === 0 ? 'checked' : ''} style="display:none !important;">\n`;
            }
            for (let i = 0; i < n; i++) {
                if (i > 0) {
                    bodyHtml += `        <label for="${pid}_s${i-1}" class="nav-L to_s${i-1}" style="grid-row: 1 !important; grid-column: 1 !important; align-self: center !important; justify-self: start !important; margin-left: 12px !important; width: 30px !important; height: 30px !important; align-items: center !important; justify-content: center !important; background: rgba(255,255,255,0.9) !important; border-radius: 50% !important; color: #333 !important; font-size: 16px !important; cursor: pointer !important; z-index: 10 !important; box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;">❮</label>\n`;
                }
                if (i < n - 1) {
                    bodyHtml += `        <label for="${pid}_s${i+1}" class="nav-R to_s${i+1}" style="grid-row: 1 !important; grid-column: 1 !important; align-self: center !important; justify-self: end !important; margin-right: 12px !important; width: 30px !important; height: 30px !important; align-items: center !important; justify-content: center !important; background: rgba(255,255,255,0.9) !important; border-radius: 50% !important; color: #333 !important; font-size: 16px !important; cursor: pointer !important; z-index: 10 !important; box-shadow: 0 2px 6px rgba(0,0,0,0.2) !important;">❯</label>\n`;
                }
            }
        }

        bodyHtml += `        <div class="carousel-track" style="grid-row: 1 !important; grid-column: 1 !important; width: 100% !important; height: 100% !important; display: flex !important; margin: 0 !important; padding: 0 !important; transition: transform 0.4s cubic-bezier(0.25, 0.8, 0.25, 1) !important;">\n`;
        images.forEach((img, i) => {
            bodyHtml += `          <div class="slide-unit" style="position: relative !important; height: 100% !important; flex-shrink: 0 !important; display: block !important;">\n`;
            bodyHtml += `            <img src="${img.url}" alt="post img ${i+1}" style="width: 100% !important; height: auto !important; aspect-ratio: 1 / 1 !important; object-fit: cover !important; display: block !important; margin: 0 !important; padding: 0 !important; border: none !important; border-radius: 0 !important;">\n`;
            if (img.isSpoiler) {
                bodyHtml += `            <span class="spoiler img-spoiler-overlay" data-spoiler="true"></span>\n`;
            }
            bodyHtml += `          </div>\n`;
        });
        bodyHtml += `        </div>\n`;
    }

    bodyHtml += `      </div>\n`;

    bodyHtml += `      <div style="padding: 16px 20px 20px !important; background-color: ${bg} !important; border-bottom-left-radius: 24px !important; border-bottom-right-radius: 24px !important; box-sizing: border-box !important; overflow: hidden !important;">\n`;
    bodyHtml += `        ${getSafeIcons(pid)}\n`;

    const formattedCaption = caption.replace(/\n/g, '<br>');
    const hasMore = caption.includes('\n') || caption.length > 30;

    bodyHtml += `        <div style="font-size: 14px !important; line-height: 1.5 !important; color: ${text} !important; margin: 0 !important;">\n`;

    if (hasMore) {
        dynamicStyles += `#cap_${pid} summary { list-style: none !important; }\n`;
        dynamicStyles += `#cap_${pid} summary::-webkit-details-marker { display: none !important; }\n`;
        dynamicStyles += `#cap_${pid}[open] .cap-closed { display: none !important; }\n`;
        dynamicStyles += `#cap_${pid}:not([open]) .cap-opened { display: none !important; }\n`;

        bodyHtml += `          <details id="cap_${pid}" style="margin: 0 !important; padding: 0 !important;">\n`;
        bodyHtml += `            <summary style="cursor: pointer !important; outline: none !important; margin: 0 !important;">\n`;
        
        bodyHtml += `              <div class="cap-closed">\n`;
        bodyHtml += `                <div style="display: -webkit-box !important; -webkit-line-clamp: 1 !important; -webkit-box-orient: vertical !important; overflow: hidden !important; word-break: break-word !important;">\n`;
        bodyHtml += `                  <strong style="color: #262626 !important; font-weight: 700 !important; margin-right: 6px !important;">${username}</strong><span style="color: #262626 !important;">${formattedCaption}</span>\n`;
        bodyHtml += `                </div>\n`;
        bodyHtml += `                <div style="color: ${sub} !important; font-size: 13px !important; margin-top: 2px !important; font-weight: 500 !important; display: inline-block !important;">더보기</div>\n`;
        bodyHtml += `              </div>\n`;

        bodyHtml += `              <div class="cap-opened" style="word-break: break-word !important;">\n`;
        bodyHtml += `                <strong style="font-weight: 700 !important; margin-right: 6px !important; color: #262626 !important;">${username}</strong><span style="color: #262626 !important;">${formattedCaption}</span>\n`;
        bodyHtml += `                <div style="color: ${sub} !important; font-size: 13px !important; margin-top: 4px !important; font-weight: 500 !important; display: inline-block !important;"> 접기</div>\n`;
        bodyHtml += `              </div>\n`;
        
        bodyHtml += `            </summary>\n`;
        bodyHtml += `          </details>\n`;
    } else {
        bodyHtml += `          <div style="word-break: break-word !important;">\n`;
        bodyHtml += `            <strong style="color: #262626 !important; font-weight: 700 !important; margin-right: 6px !important;">${username}</strong><span style="color: #262626 !important;">${formattedCaption}</span>\n`;
        bodyHtml += `          </div>\n`;
    }

    if (tags) {
        bodyHtml += `          <div style="color: #00376b !important; font-size: 13px !important; margin-top: 6px !important; word-break: break-word !important;">${tags}</div>\n`;
    }

    bodyHtml += `        </div>\n`;
    bodyHtml += `      </div>\n`;
    bodyHtml += `    </div>\n`;
    bodyHtml += `  </${wrapTag}>\n`;

    return { css: dynamicStyles, html: bodyHtml };
}

function generateFinalHtml() {
    let dynamicStyles = baseStaticCss;
    let bodyHtml = `\n<div class="insta-gallery-container" style="width: 100%; max-width: 480px !important; margin: 0 auto !important; font-family: 'Pretendard', sans-serif !important; color: #262626 !important; box-sizing: border-box !important;">\n`;

    posts.forEach(post => {
        const { css, html } = post.type === 'grid' ? buildGridMarkup(post) : buildPostMarkup(post);
        dynamicStyles += css;
        bodyHtml += html;
    });

    bodyHtml += "\n</div>";

    return `<style>\n${dynamicStyles}\n</style>\n${bodyHtml}`;
}

const STORAGE_KEY = 'insta_feed_admin_v3';
let posts = [];
let editingId = null;
let lastCaption = '';
let lastTags = '';

const iconEdit = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 1 1 3 3L12 15l-4 1 1-4Z"/></svg>`;
const iconTrash = `<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>`;

function uid() {
    return 'post_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
}

function renderFeed() {
    const feed = document.getElementById('feed');
    const empty = document.getElementById('emptyState');

    feed.querySelectorAll('.post-card').forEach(el => el.remove());

    empty.style.display = posts.length === 0 ? 'flex' : 'none';

    posts.forEach(post => {
        const isGrid = post.type === 'grid';
        const { css, html } = isGrid ? buildGridMarkup(post) : buildPostMarkup(post);
        
        const previewHtml = isGrid ? html : html.replace('<details class="insta-post"', '<details class="insta-post" open');

        const card = document.createElement('div');
        card.className = 'post-card';
        card.dataset.id = post.id;
        card.innerHTML = `
            <button type="button" class="post-menu-btn${isGrid ? ' post-menu-btn--dots' : ''}" onclick="toggleMenu(event,'${post.id}')" aria-label="옵션"></button>
            <div class="post-menu-dropdown" id="menu-${post.id}">
                <button type="button" onclick="editPost('${post.id}')">${iconEdit} 수정</button>
                <button type="button" class="danger" onclick="deletePost('${post.id}')">${iconTrash} 삭제</button>
            </div>
            <style>${css}</style>
            ${previewHtml}
        `;
        feed.appendChild(card);
    });

    document.getElementById('copyBtn').disabled = posts.length === 0;
}

function toggleMenu(e, id) {
    e.preventDefault();
    e.stopPropagation();
    const dropdown = document.getElementById('menu-' + id);
    const willOpen = !dropdown.classList.contains('open');
    document.querySelectorAll('.post-menu-dropdown.open').forEach(d => d.classList.remove('open'));
    if (willOpen) dropdown.classList.add('open');
}

document.addEventListener('click', (e) => {
    if (!e.target.closest('.post-menu-dropdown') && !e.target.closest('.post-menu-btn')) {
        document.querySelectorAll('.post-menu-dropdown.open').forEach(d => d.classList.remove('open'));
    }
});

function toggleFields() {
    const isGrid = document.getElementById('type-grid').checked;
    document.getElementById('postOnlyFieldsTop').style.display = isGrid ? 'none' : 'flex';
    document.getElementById('captionLabel').textContent = isGrid ? '바이오' : '본문 텍스트';

    // 피드(grid) 탭일 때는 '펼쳐두기' 옵션을 숨김 처리
    const expandedField = document.getElementById('f-expanded').closest('.field');
    if (expandedField) {
        expandedField.style.display = isGrid ? 'none' : 'flex';
    }
}

function editPost(id) {
    document.querySelectorAll('.post-menu-dropdown.open').forEach(d => d.classList.remove('open'));
    const post = posts.find(p => p.id === id);
    if (post) openModal(post);
}

function deletePost(id) {
    document.querySelectorAll('.post-menu-dropdown.open').forEach(d => d.classList.remove('open'));
    if (!confirm('이 게시물을 삭제할까요?')) return;
    posts = posts.filter(p => p.id !== id);
    saveState();
    renderFeed();
}

function openModal(post) {
    editingId = post ? post.id : null;
    document.getElementById('modalTitle').textContent = post ? '게시물 수정' : '새 게시물';
    document.getElementById('submitBtn').textContent = post ? '수정 완료' : '등록하기';

    const type = post ? (post.type || 'post') : 'post';
    document.getElementById(type === 'grid' ? 'type-grid' : 'type-post').checked = true;
    
    document.getElementById('f-username').value = post ? (post.username || '') : 'noname';
    document.getElementById('f-profile').value = post ? (post.profile || '') : '';
    document.getElementById('f-time').value = post ? (post.time || '') : getCurrentTimeStr();
    document.getElementById('f-images').value = post ? (post.images || '') : '';
    document.getElementById('f-caption').value = post ? (post.caption || '') : lastCaption;
    document.getElementById('f-tags').value = post ? (post.tags || '') : lastTags;
    document.getElementById('f-expanded').checked = post ? !!post.expanded : false;

    toggleFields();

    document.getElementById('modalOverlay').classList.add('open');
    document.body.style.overflow = 'hidden';
    
    setTimeout(() => {
        document.getElementById('f-username').focus();
    }, 100);
}

function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    document.body.style.overflow = '';
    editingId = null;
}

function handleSubmit(e) {
    e.preventDefault();
    const isGrid = document.getElementById('type-grid').checked;
    
    const data = {
        type: isGrid ? 'grid' : 'post',
        username: document.getElementById('f-username').value.trim(),
        profile: document.getElementById('f-profile').value.trim(),
        time: document.getElementById('f-time').value.trim(),
        images: document.getElementById('f-images').value,
        caption: document.getElementById('f-caption').value.trim(),
        tags: document.getElementById('f-tags').value.trim(),
        expanded: document.getElementById('f-expanded').checked
    };

    if (!isGrid) {
        lastCaption = data.caption;
        lastTags = data.tags;
    }

    if (editingId) {
        const idx = posts.findIndex(p => p.id === editingId);
        if (idx > -1) posts[idx] = { ...posts[idx], ...data };
    } else {
        posts.push({ id: uid(), ...data });
    }

    saveState();
    renderFeed();
    closeModal();
}

function resetAll() {
    if (posts.length === 0) return;
    if (!confirm('저장된 모든 게시물을 삭제할까요? 이 작업은 되돌릴 수 없습니다.')) return;
    posts = [];
    saveState();
    renderFeed();
}

let toastTimer = null;
function showToast(msg, isError) {
    const toast = document.getElementById('toast');
    document.getElementById('toastMsg').textContent = msg;
    toast.classList.toggle('toast-error', !!isError);
    toast.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.classList.remove('show'), 2200);
}

async function copyCode() {
    if (posts.length === 0) {
        showToast('먼저 게시물을 추가해주세요', true);
        return;
    }
    const finalHtml = generateFinalHtml();
    try {
        if (navigator.clipboard && window.isSecureContext) {
            await navigator.clipboard.writeText(finalHtml);
        } else {
            const ta = document.createElement('textarea');
            ta.value = finalHtml;
            ta.style.position = 'fixed';
            ta.style.left = '-9999px';
            document.body.appendChild(ta);
            ta.select();
            document.execCommand('copy');
            document.body.removeChild(ta);
        }
        showToast('코드가 복사되었습니다');
    } catch (err) {
        showToast('복사에 실패했어요', true);
    }
}

function saveState() {
    try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(posts));
    } catch (e) {
        console.warn('저장 실패:', e);
    }
}

function loadState() {
    try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (raw) posts = JSON.parse(raw) || [];
    } catch (e) {
        console.warn('불러오기 실패:', e);
    }
    renderFeed();
}

document.getElementById('cameraBtn').addEventListener('click', () => openModal());
document.getElementById('addBtn').addEventListener('click', () => openModal());

window.addEventListener('DOMContentLoaded', loadState);

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js')
      .then(reg => console.log('Service Worker 등록 성공:', reg.scope))
      .catch(err => console.log('Service Worker 등록 실패:', err));
  });
}
</script>
